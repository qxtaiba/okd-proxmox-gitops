---
name: ci
on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]
permissions:
  contents: read
jobs:
  lint-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: stable
      - run: go install github.com/google/yamlfmt/cmd/yamlfmt@latest
      - run: yamlfmt -lint .
  validate-terraform:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [prowlarr, sonarr, radarr]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: opentofu/setup-opentofu@592200f414f725c590d4149efd28e296413e955c # v1
        with:
          tofu_wrapper: false
      - run: tofu fmt -check -diff
        working-directory: kubernetes/terraform/${{ matrix.module }}
      - run: tofu init -backend=false
        working-directory: kubernetes/terraform/${{ matrix.module }}
      - run: tofu validate
        working-directory: kubernetes/terraform/${{ matrix.module }}
  validate-flux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: fluxcd/flux2/action@main
      - run: pip install flux-local
      - run: flux-local test --path kubernetes/clusters/production --enable-helm --all-namespaces
