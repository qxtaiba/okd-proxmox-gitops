---
name: ci
on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]
permissions:
  contents: read
jobs:
  lint-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
      - run: go install github.com/google/yamlfmt/cmd/yamlfmt@latest
      - run: yamlfmt -lint .
  validate-schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
      - run: go install github.com/yannh/kubeconform/cmd/kubeconform@latest
      - run: |
          kubeconform -summary -strict \
            -ignore-filename-pattern '.*/(kustomization|secret)\.yaml' \
            -ignore-filename-pattern '.*/homepage/app/resources/.*' \
            -schema-location default \
            -schema-location 'https://kubernetes-schemas.pages.dev/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -skip CustomResourceDefinition,MachineConfig,Terraform,FluxInstance,Route,SecurityContextConstraints,APIServer,Config,DNS,IngressController,IPAddressPool,L2Advertisement \
            kubernetes/
  validate-terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2
        with:
          tofu_wrapper: false
      - run: |
          for module in prowlarr sonarr radarr; do
            tofu -chdir=kubernetes/terraform/$module fmt -check -diff
            tofu -chdir=kubernetes/terraform/$module init -backend=false
            tofu -chdir=kubernetes/terraform/$module validate
          done
  validate-flux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: fluxcd/flux2/action@c8b4c4c620db540128fcc52ff4b61775c27ee9d3 # main
      - run: pip install flux-local
      - run: flux-local test --path kubernetes/clusters/production --enable-helm --all-namespaces
