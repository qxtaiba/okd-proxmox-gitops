---
name: ci
on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]
permissions:
  contents: read
jobs:
  lint-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: stable
      - run: go install github.com/google/yamlfmt/cmd/yamlfmt@latest
      - run: yamlfmt -lint .
  validate-terraform:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [prowlarr, sonarr, radarr]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_wrapper: false
      - run: tofu fmt -check -diff
        working-directory: kubernetes/terraform/${{ matrix.module }}
      - run: tofu init -backend=false
        working-directory: kubernetes/terraform/${{ matrix.module }}
      - run: tofu validate
        working-directory: kubernetes/terraform/${{ matrix.module }}
  validate-flux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: fluxcd/flux2/action@main
      - run: pip install flux-local
      - run: flux-local test --path kubernetes/clusters/production --enable-helm --all-namespaces
