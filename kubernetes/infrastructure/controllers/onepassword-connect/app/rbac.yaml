---
# ServiceAccount is created by the 1Password Connect chart via
# values.connect.serviceAccount.{create,name}; only the SCC RoleBinding
# lives here.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: onepassword-connect-scc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:nonroot-v2
subjects:
  - kind: ServiceAccount
    name: onepassword-connect
