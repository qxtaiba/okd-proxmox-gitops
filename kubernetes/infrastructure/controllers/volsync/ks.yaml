# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: volsync
  namespace: flux-system
spec:
  targetNamespace: volsync-system
  path: ./kubernetes/infrastructure/controllers/volsync/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  # 1h interval intentional: volsync reconciliation is expensive and
  # backup schedules (ReplicationSource.spec.trigger) are the authoritative
  # cadence, not Flux reconcile frequency.
  interval: 1h
  timeout: 5m
  retryInterval: 2m
  prune: true
  wait: true
