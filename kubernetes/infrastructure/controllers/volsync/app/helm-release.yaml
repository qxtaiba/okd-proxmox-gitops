# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: volsync
spec:
  interval: 1h
  chart:
    spec:
      chart: volsync
      version: "0.15.0"
      sourceRef:
        kind: HelmRepository
        name: backube
  # retries: -1 means retry indefinitely. Volsync's restic cache PVCs bind
  # to ceph-block which is provisioned by rook-ceph-cluster from a sibling
  # Kustomization tree - Flux retries until the storage class exists
  # instead of failing.
  install:
    crds: CreateReplace
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    remediation:
      retries: -1
