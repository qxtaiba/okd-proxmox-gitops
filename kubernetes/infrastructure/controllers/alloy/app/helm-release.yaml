# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
spec:
  interval: 1h
  chart:
    spec:
      chart: alloy
      version: "1.0.1"
      sourceRef:
        kind: HelmRepository
        name: grafana
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    alloy:
      configMap:
        content: |
          // Discover all pods in the cluster
          discovery.kubernetes "pods" {
            role = "pod"
          }

          // Relabel to extract useful metadata
          discovery.relabel "pods" {
            targets = discovery.kubernetes.pods.targets

            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              target_label  = "node"
            }
            rule {
              source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name"]
              separator     = "/"
              target_label  = "job"
            }
          }

          // Read logs from discovered pods
          loki.source.kubernetes "pods" {
            targets    = discovery.relabel.pods.output
            forward_to = [loki.process.pods.receiver]
          }

          // Process logs: parse CRI format, extract level, add cluster label
          loki.process "pods" {
            stage.cri {}

            // *arr apps (sonarr, radarr, prowlarr, etc.): [Info] Component: message
            stage.regex {
              expression = "^\\[(?P<level>\\w+)\\]"
            }

            // JSON logs: {"level":"info", ...}
            stage.json {
              expressions = {
                json_level = "level",
              }
            }

            // Normalize to a single "level" label, preferring regex match then JSON
            stage.template {
              source   = "level"
              template = "{{ if .level }}{{ .level }}{{ else if .json_level }}{{ .json_level }}{{ else }}unknown{{ end }}"
            }

            // Lowercase for consistency (Info -> info, ERROR -> error)
            stage.template {
              source   = "level"
              template = "{{ ToLower .Value }}"
            }

            stage.labels {
              values = {
                level = "",
              }
            }

            stage.static_labels {
              values = {
                cluster = "okd",
              }
            }

            forward_to = [loki.write.default.receiver]
          }

          // Write logs to Loki gateway
          loki.write "default" {
            endpoint {
              url = "http://loki-gateway.observability.svc.cluster.local:80/loki/api/v1/push"
            }
          }
      mounts:
        varlog: true
        dockercontainers: true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi
    controller:
      type: daemonset
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: storage-node
          operator: Exists
          effect: NoSchedule
    serviceMonitor:
      enabled: true
