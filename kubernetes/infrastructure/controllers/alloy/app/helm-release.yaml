# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
spec:
  interval: 10m
  chart:
    spec:
      chart: alloy
      version: "1.7.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    alloy:
      configMap:
        content: |
          // Discover all pods in the cluster
          discovery.kubernetes "pods" {
            role = "pod"
          }

          // Relabel to extract useful metadata
          discovery.relabel "pods" {
            targets = discovery.kubernetes.pods.targets

            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
            // app name from standard k8s label (low cardinality, set by bjw-s app-template)
            rule {
              source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
              target_label  = "app"
            }
          }

          // Read logs from discovered pods
          loki.source.kubernetes "pods" {
            targets    = discovery.relabel.pods.output
            forward_to = [loki.process.pods.receiver]
          }

          // Process logs: parse CRI format, extract level, add cluster label
          loki.process "pods" {
            stage.cri {}

            // *arr apps (sonarr, radarr, prowlarr, etc.): [Info] Component: message
            stage.regex {
              expression = "^\\[(?P<level>\\w+)\\]"
            }

            // JSON logs: {"level":"info", ...}
            // Safe on non-JSON lines: silently passes through
            stage.json {
              expressions = {
                json_level = "level",
              }
            }

            // Normalize: prefer regex match, then JSON, then "unknown"
            // Escaped with backticks so Helm tpl does not consume the Go templates
            stage.template {
              source   = "detected_level"
              template = "{{ `{{- if .level }}{{ .level }}{{ else if .json_level }}{{ .json_level }}{{ else }}unknown{{ end }}` }}"
            }

            // Lowercase for consistency (Info -> info, ERROR -> error)
            stage.template {
              source   = "detected_level"
              template = "{{ `{{ ToLower .Value }}` }}"
            }

            stage.labels {
              values = {
                level = "detected_level",
              }
            }

            stage.static_labels {
              values = {
                cluster = "okd",
              }
            }

            forward_to = [loki.write.default.receiver]
          }

          // Write logs to Loki gateway
          loki.write "default" {
            endpoint {
              url = "http://loki-gateway.observability.svc.cluster.local:80/loki/api/v1/push"
            }
          }
      mounts:
        varlog: true
        dockercontainers: true
      resources:
        requests:
          cpu: 50m
          memory: 96Mi
        limits:
          memory: 512Mi
      initialDelaySeconds: 30
      timeoutSeconds: 10
    configReloader:
      enabled: false
    controller:
      type: daemonset
      podAnnotations:
        reloader.stakater.com/auto: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: storage-node
          operator: Exists
          effect: NoSchedule
    serviceMonitor:
      enabled: true
