# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: metallb
  install:
    crds: CreateReplace
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    disableWait: true
    remediation:
      retries: 3
  values:
    priorityClassName: infrastructure-critical
    prometheus:
      serviceAccount: prometheus-k8s
      namespace: openshift-monitoring
      serviceMonitor:
        enabled: true
      speakerMetricsTLSSecret: ""
      controllerMetricsTLSSecret: ""
    speaker:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 128Mi
    controller:
      replicaCount: 2
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 128Mi
      podDisruptionBudget:
        enabled: true
        minAvailable: 1
