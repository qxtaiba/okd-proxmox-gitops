# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: metallb
spec:
  interval: 10m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    # renovate: pinned — 0.16.1 introduces FRR components whose chart-internal
    # wait fails on our cluster (chart hooks time out before frr-k8s DaemonSet
    # comes up). Hold at 0.15.3 until a fresh attempt at upgrading is planned.
    tag: "0.15.3"
  url: oci://quay.io/metallb/chart/metallb
