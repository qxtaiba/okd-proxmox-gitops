# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-operator
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: rook-ceph
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    priorityClassName: storage-critical
    crds:
      enabled: true
    monitoring:
      enabled: true
    csi:
      enableRbdDriver: true
      enableCephfsDriver: true
      forceCephFSKernelClient: true
      enableCSIDriverSelinuxMount: false
      enableLiveness: true
      serviceMonitor:
        enabled: true
    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 200m
        memory: 128Mi
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
