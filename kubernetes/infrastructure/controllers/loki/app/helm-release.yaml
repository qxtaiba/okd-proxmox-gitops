# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: loki
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    global:
      dnsService: dns-default
      dnsNamespace: openshift-dns
    deploymentMode: SimpleScalable
    loki:
      auth_enabled: false
      storage:
        type: s3
        s3:
          endpoint: rook-ceph-rgw-okd-ceph-objectstore.rook-ceph.svc.cluster.local:80
          region: us-east-1
          insecure: true
          s3ForcePathStyle: true
        bucketNames:
          chunks: loki-chunks
          ruler: loki-chunks
          admin: loki-chunks
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      limits_config:
        retention_period: 336h
      compactor:
        retention_enabled: true
        delete_request_store: s3
    backend:
      replicas: 2
      extraEnvFrom:
        - secretRef:
            name: loki-bucket
        - configMapRef:
            name: loki-bucket
      persistence:
        storageClass: ceph-block
        size: 10Gi
    read:
      replicas: 2
      extraEnvFrom:
        - secretRef:
            name: loki-bucket
        - configMapRef:
            name: loki-bucket
      persistence:
        storageClass: ceph-block
        size: 10Gi
    write:
      replicas: 2
      extraEnvFrom:
        - secretRef:
            name: loki-bucket
        - configMapRef:
            name: loki-bucket
      persistence:
        storageClass: ceph-block
        size: 10Gi
    gateway:
      replicas: 1
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    lokiCanary:
      enabled: false
    minio:
      enabled: false
    test:
      enabled: false
    monitoring:
      serviceMonitor:
        enabled: true
