# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: loki
  namespace: flux-system
spec:
  targetNamespace: observability
  path: ./kubernetes/infrastructure/controllers/loki/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: grafana
      namespace: flux-system
  interval: 10m
  timeout: 5m
  retryInterval: 1m
  prune: true
  # wait: false so infra-controllers does not block on loki becoming Ready.
  # Loki's HelmRelease valuesFrom depends on the loki-bucket ConfigMap emitted
  # by the Rook OBC, which only exists after rook-ceph-cluster runs in the
  # cluster-apps tree. Without this, infra-controllers -> infra-configs ->
  # cluster-apps deadlocks on cold bootstrap. Loki itself retries indefinitely
  # (install.remediation.retries: -1 in helm-release.yaml).
  wait: false
