# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grappleberry-xyz-tls
spec:
  # Periodic so cert-manager renewals (pushed to 1Password by certificates-export-config)
  # propagate to openshift-ingress within refreshInterval, preventing silent expiry at ~90d.
  refreshInterval: 15m
  refreshPolicy: Periodic
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: grappleberry-xyz-tls
    creationPolicy: Orphan
    template:
      type: kubernetes.io/tls
      metadata:
        annotations:
          cert-manager.io/alt-names: "*.grappleberry.xyz,grappleberry.xyz"
          cert-manager.io/certificate-name: grappleberry-xyz-tls
          cert-manager.io/common-name: grappleberry.xyz
          cert-manager.io/ip-sans: ""
          cert-manager.io/issuer-group: ""
          cert-manager.io/issuer-kind: ClusterIssuer
          cert-manager.io/issuer-name: letsencrypt-production
          cert-manager.io/uri-sans: ""
        labels:
          controller.cert-manager.io/fao: "true"
  dataFrom:
    - extract:
        key: grappleberry-xyz-tls
        decodingStrategy: Base64
