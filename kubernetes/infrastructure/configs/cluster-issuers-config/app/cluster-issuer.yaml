# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/clusterissuer_v1.json
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: qan205@nyu.edu
    privateKeySecretRef:
      name: letsencrypt-production
    solvers:
      # Single-zone homelab: this solver only handles grappleberry.xyz.
      # If adding a second domain in the future, either add another solver
      # entry or remove the dnsZones selector to make it zone-agnostic.
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-issuer-secret
              key: CLOUDFLARE_DNS_TOKEN
        selector:
          dnsZones:
            - grappleberry.xyz
