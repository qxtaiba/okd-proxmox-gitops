# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
---
# Imports the Let's Encrypt ACME account private key from 1Password on
# cluster rebuild. creationPolicy: Merge leaves any other fields
# cert-manager adds to the Secret untouched; refreshPolicy Periodic keeps
# 1Password and the live Secret in sync with a low-cost 1h interval.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: letsencrypt-account-key
spec:
  refreshInterval: 1h
  refreshPolicy: Periodic
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: letsencrypt-production
    creationPolicy: Merge
  data:
    - secretKey: tls.key
      remoteRef:
        key: letsencrypt-account-key
        property: tls.key
