# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: volsync-config
  namespace: flux-system
spec:
  targetNamespace: default
  path: ./kubernetes/infrastructure/configs/volsync-config/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: volsync
      namespace: flux-system
    - name: cluster-secrets
      namespace: flux-system
  # 1h interval intentional: see volsync/ks.yaml. Backup schedules are
  # the authoritative cadence; Flux only ensures the CRs exist.
  interval: 1h
  timeout: 5m
  retryInterval: 2m
  prune: true
  wait: true
