# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/pushsecret_v1alpha1.json
---
# Exports the Let's Encrypt ACME account private key to 1Password.
# On cluster rebuild, cluster-issuers-config/letsencrypt-account-key
# restores this Secret so cert-manager reuses the existing ACME account
# instead of generating a new one (which would reset per-account rate
# limit budget on Let's Encrypt).
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: letsencrypt-account-key
spec:
  secretStoreRefs:
    - name: onepassword
      kind: ClusterSecretStore
  selector:
    secret:
      name: letsencrypt-production
  template:
    data:
      tls.key: '{{ index . "tls.key" | b64enc }}'
  data:
    - match:
        secretKey: &key tls.key
        remoteRef:
          remoteKey: letsencrypt-account-key
          property: *key
