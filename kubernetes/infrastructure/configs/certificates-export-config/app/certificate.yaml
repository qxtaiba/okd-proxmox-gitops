# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/certificate_v1.json
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grappleberry-xyz-tls
spec:
  secretName: grappleberry-xyz-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: grappleberry.xyz
  dnsNames:
    - grappleberry.xyz
    - "*.grappleberry.xyz"
  # Explicit renewal policy matches cert-manager defaults for Let's Encrypt
  # (90d lifetime, renew 30d before expiry). Declared here so the renewal
  # cadence is obvious without having to know cert-manager defaults.
  duration: 2160h  # 90d
  renewBefore: 720h  # 30d
