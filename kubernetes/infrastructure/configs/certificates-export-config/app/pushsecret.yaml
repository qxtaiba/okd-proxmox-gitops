# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/pushsecret_v1alpha1.json
---
# NOTE: PushSecret is still v1alpha1 in external-secrets 0.14/chart 2.2.
# No v1beta1 exists yet despite External Secrets v1 being GA for
# ExternalSecret resources. Revisit when upstream ships v1beta1.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: grappleberry-xyz-tls
spec:
  secretStoreRefs:
    - name: onepassword
      kind: ClusterSecretStore
  selector:
    secret:
      name: grappleberry-xyz-tls
  template:
    data:
      tls.crt: '{{ index . "tls.crt" | b64enc }}'
      tls.key: '{{ index . "tls.key" | b64enc }}'
  data:
    - match:
        secretKey: &crt tls.crt
        remoteRef:
          remoteKey: grappleberry-xyz-tls
          property: *crt
    - match:
        secretKey: &key tls.key
        remoteRef:
          remoteKey: grappleberry-xyz-tls
          property: *key
