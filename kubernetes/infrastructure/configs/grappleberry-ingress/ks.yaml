# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grappleberry-ingress
  namespace: flux-system
spec:
  targetNamespace: openshift-ingress-operator
  path: ./kubernetes/infrastructure/configs/grappleberry-ingress/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: certificates-import-config
      namespace: flux-system
    - name: metallb-config
      namespace: flux-system
  interval: 10m
  timeout: 5m
  retryInterval: 1m
  prune: true
  wait: true
