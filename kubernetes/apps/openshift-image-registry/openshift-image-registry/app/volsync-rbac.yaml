# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/v1/serviceaccount.json
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: volsync-mover
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: volsync-mover-scc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:volsync-nfs-mover
subjects:
  - kind: ServiceAccount
    name: volsync-mover
    namespace: openshift-image-registry
