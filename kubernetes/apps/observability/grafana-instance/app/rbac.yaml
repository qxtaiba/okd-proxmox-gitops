# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/v1/serviceaccount.json
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-thanos
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-thanos
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: grafana-thanos
    namespace: observability
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-datasource-token
  annotations:
    kubernetes.io/service-account.name: grafana-thanos
type: kubernetes.io/service-account-token
