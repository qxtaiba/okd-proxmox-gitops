# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/route.openshift.io/route_v1.json
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: grafana
  labels:
    ingress: grappleberry
spec:
  host: grafana.grappleberry.xyz
  port:
    targetPort: 3000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  to:
    kind: Service
    name: grafana-service
    weight: 100
  wildcardPolicy: None
