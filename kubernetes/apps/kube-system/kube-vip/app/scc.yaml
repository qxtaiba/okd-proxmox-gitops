# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/security.openshift.io/securitycontextconstraints_v1.json
---
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: kube-vip
allowHostNetwork: true
allowHostPorts: true
allowPrivilegedContainer: false
allowedCapabilities:
  - NET_ADMIN
  - NET_RAW
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
