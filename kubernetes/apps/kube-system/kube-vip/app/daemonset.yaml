# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/apps/daemonset_v1.json
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-vip
  namespace: kube-system
  labels:
    app.kubernetes.io/name: kube-vip
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-vip
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-vip
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/master
                    operator: Exists
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
      containers:
        - name: kube-vip
          image: ghcr.io/kube-vip/kube-vip:v1.1.2
          args:
            - manager
          env:
            # VIP configuration
            - name: vip_arp
              value: "true"
            - name: vip_interface
              value: ens18
            - name: address
              value: "192.168.227.10"
            - name: vip_cidr
              value: "32"
            # Control plane HA
            - name: cp_enable
              value: "true"
            - name: cp_namespace
              value: kube-system
            - name: port
              value: "6443"
            # IPVS load balancing disabled - OKD API server certs don't include node IPs in SANs
            # which causes kube-vip health checks to fail with TLS cert verification errors
            # VIP still works via ARP mode (cp_enable), only L4 load balancing across API servers is disabled
            - name: lb_enable
              value: "false"
            # Leader election
            - name: vip_leaderelection
              value: "true"
            - name: vip_leasename
              value: kube-vip-lease
            - name: vip_leaseduration
              value: "15"
            - name: vip_renewdeadline
              value: "10"
            - name: vip_retryperiod
              value: "2"
            # Disable services (MetalLB handles this)
            - name: svc_enable
              value: "false"
            # Node identity for leader election
            - name: vip_nodename
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Use local API server to avoid ClusterIP dependency on OVN at boot
            - name: KUBERNETES_SERVICE_HOST
              value: "localhost"
            - name: KUBERNETES_SERVICE_PORT
              value: "6443"
            # Logging
            - name: vip_loglevel
              value: "5"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
      hostNetwork: true
      serviceAccountName: kube-vip
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists
