# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/batch/cronjob_v1.json
---
# Nightly backup of tofu-controller's Terraform state from the Ceph RGW
# bucket to the NAS. Without this, losing Ceph loses the state, and the
# subsequent `tofu apply` collides with resources already present in the
# *arr databases (restored from Volsync) with "resource already exists"
# errors.
#
# Destination: /volume1/backups/tofu-state/<date>/ on the NAS.
# Directory must exist and be writable by the pod UID — see etcd-backup
# and volsync for the same subpath pattern.
# Retention handled inline (keep last 30 days).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: tofu-state-backup
spec:
  schedule: "15 3 * * *"
  timeZone: Asia/Dubai
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          # tf-runner SA is already bound to nonroot-v2 SCC (see rbac.yaml)
          # which allows runAsUser: 1000. Without this, the pod would fall back
          # to the namespace default SA and fail admission under restricted-v2.
          serviceAccountName: tf-runner
          containers:
            - name: backup
              image: docker.io/minio/mc:RELEASE.2025-04-03T17-07-56Z
              envFrom:
                - secretRef:
                    name: tofu-state-bucket
                - configMapRef:
                    name: tofu-state-bucket
              env:
                - name: MC_CONFIG_DIR
                  value: /tmp/mc
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  TS=$(date +%Y%m%d-%H%M%S)
                  DEST=/backup/${TS}
                  mkdir -p "${DEST}"
                  mc alias set ceph "http://${BUCKET_HOST}:${BUCKET_PORT}" \
                    "${AWS_ACCESS_KEY_ID}" "${AWS_SECRET_ACCESS_KEY}"
                  mc cp --recursive "ceph/${BUCKET_NAME}/" "${DEST}/"
                  echo "pruning tofu-state backups, keeping last 30"
                  cd /backup && \
                    ls -1dt [0-9]*/ 2>/dev/null | tail -n +31 | while read d; do
                      echo "pruning: ${d}"
                      rm -rf "${d}"
                    done
                  echo "tofu-state backup complete: ${TS}"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: backup-nfs
                  mountPath: /backup
          volumes:
            - name: backup-nfs
              nfs:
                server: nas.grappleberry.xyz
                path: /volume1/backups/tofu-state
