# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/v1/persistentvolumeclaim.json
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: radarr-media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: radarr-media
  resources:
    requests:
      storage: 10Ti
