# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/v1/configmap.json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-config
data:
  recyclarr.yml: |-
    # yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/master/schemas/config-schema.json

    sonarr:
      sonarr:
        base_url: http://sonarr.default.svc.cluster.local:8989
        api_key: !env_var SONARR_API_KEY
        delete_old_custom_formats: true
        replace_existing_custom_formats: true
        # NOTE: recyclarr 8.x restructured config-templates so templates are
        # now complete instance definitions used via `recyclarr config create`,
        # not `include:` targets. The old include: syntax was removed. We keep
        # only the custom_formats block below (which references trash_ids
        # directly, not templates). Quality profiles/definitions are assumed
        # to already exist on the sonarr instance; they are no longer
        # reconciled by recyclarr. To restore full template-based reconcile,
        # replace this config entirely per the 8.x quickstart guide.
        custom_formats:
          # Block DV without HDR10 fallback (causes green tint on non-DV devices)
          - trash_ids:
              - 9b27ab6498ec0f31a3353992e19434ca # DV (WEBDL)
            assign_scores_to:
              - name: WEB-2160p
          # Block SDR content on 4K profile
          - trash_ids:
              - 2016d1676f5ee13a5b7257ff86ac9a93 # SDR
            assign_scores_to:
              - name: WEB-2160p
          # FLUX trumps repacks
          - trash_ids:
              - 5d9fd1b1e06cd8a475462f40214b7df6 # FLUX
            assign_scores_to:
              - name: WEB-2160p
                score: 100
              - name: WEB-1080p
                score: 100
          # Unwanted
          - trash_ids:
              - 32b367365729d530ca1c124a0b180c64 # Bad Dual Groups
              - 82d40da2bc6923f41e14394075dd4b03 # No-RlsGroup
              - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
              - 06d66ab109d4d2eddb2794d21526d140 # Retags
              - 1b3994c551cbb92a2c781af061f4ab44 # Scene
            assign_scores_to:
              - name: WEB-2160p
              - name: WEB-1080p

    radarr:
      radarr:
        base_url: http://radarr.default.svc.cluster.local:7878
        api_key: !env_var RADARR_API_KEY
        delete_old_custom_formats: true
        replace_existing_custom_formats: true
        # NOTE: see sonarr block above re: recyclarr 8.x template restructure.
        # The include: block was removed; only custom_formats remain.
        custom_formats:
          # Block DV without HDR10 fallback
          - trash_ids:
              - 923b6abef9b17f937fab56cfcf89e1f1 # DV (WEBDL)
            assign_scores_to:
              - name: UHD Bluray + WEB
          # Block SDR content on UHD profile
          - trash_ids:
              - 9c38ebb7384dada637be8899efa68e6f # SDR
            assign_scores_to:
              - name: UHD Bluray + WEB
          # Unwanted
          - trash_ids:
              - b6832f586342ef70d9c128d40c07b872 # Bad Dual Groups
              - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5 # No-RlsGroup
              - 7357cf5161efbf8c4d5d0c30b4815ee2 # Obfuscated
              - 5c44f52a8714fdd79bb4d98e2673be1f # Retags
              - f537cf427b64c38c8e36298f657e4828 # Scene
            assign_scores_to:
              - name: UHD Bluray + WEB
              - name: HD Bluray + WEB
