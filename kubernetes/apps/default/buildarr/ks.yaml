# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: buildarr
  namespace: flux-system
spec:
  targetNamespace: default
  path: ./kubernetes/apps/default/buildarr/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  dependsOn:
    - name: cluster-secrets
      namespace: flux-system
    - name: sonarr
      namespace: flux-system
    - name: radarr
      namespace: flux-system
    - name: prowlarr
      namespace: flux-system
    - name: sabnzbd
      namespace: flux-system
    - name: qbittorrent
      namespace: flux-system
    - name: plex
      namespace: flux-system
  interval: 1h
  timeout: 5m
  retryInterval: 2m
  prune: true
  wait: true
