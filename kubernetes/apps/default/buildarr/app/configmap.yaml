# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/v1/configmap.json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: buildarr-config
data:
  buildarr.yml: |-
    # yaml-language-server: $schema=https://buildarr.github.io/schemas/buildarr/config-schema.json
    #
    # Buildarr Configuration
    # =======================
    # Manages: Prowlarr indexers, download clients, root folders, naming, notifications
    # TRaSH Quality Profiles: Handled by Recyclarr (separate CronJob)
    #
    # Best Practices Applied:
    # - TRaSH-recommended naming schemes
    # - propers_and_repacks: do-not-prefer (let custom formats handle scoring)
    # - use_hardlinks: false (downloads on Ceph, media on NAS = different filesystems)
    # - Usenet-only indexer (NZBGeek)
    #

    buildarr:
      watch_config: false
      update_days:
        - monday
        - tuesday
        - wednesday
        - thursday
        - friday
        - saturday
        - sunday
      update_times:
        - "00:30"

    # =============================================================================
    # PROWLARR - Indexer Manager
    # =============================================================================
    prowlarr:
      hostname: prowlarr.default.svc.cluster.local
      port: 9696
      protocol: http
      api_key: !env_var PROWLARR_API_KEY

      settings:
        # ---------------------------------------------------------------------
        # Indexers (Usenet Only - NZBGeek)
        # ---------------------------------------------------------------------
        indexers:
          indexers:
            definitions:
              NZBGeek:
                type: newznab
                enable: true
                priority: 10
                fields:
                  baseUrl: https://api.nzbgeek.info
                  apiPath: /api
                  apiKey: !env_var NZBGEEK_API_KEY
                  vipExpiration: ""
                tags: []

        # ---------------------------------------------------------------------
        # Download Clients
        # ---------------------------------------------------------------------
        download_clients:
          definitions:
            SABnzbd:
              type: sabnzbd
              enable: true
              priority: 1
              host: sabnzbd.default.svc.cluster.local
              port: 8080
              use_ssl: false
              api_key: !env_var SABNZBD_API_KEY
              category: prowlarr
              tags: []

        # ---------------------------------------------------------------------
        # Applications (Radarr/Sonarr sync)
        # ---------------------------------------------------------------------
        apps:
          applications:
            definitions:
              Radarr:
                type: radarr
                sync_level: full-sync
                prowlarr_url: http://prowlarr.default.svc.cluster.local:9696
                base_url: http://radarr.default.svc.cluster.local:7878
                api_key: !env_var RADARR_API_KEY
                sync_categories:
                  - 2000   # Movies
                  - 2010   # Movies/Foreign
                  - 2020   # Movies/Other
                  - 2030   # Movies/SD
                  - 2040   # Movies/HD
                  - 2045   # Movies/UHD
                  - 2050   # Movies/BluRay
                  - 2060   # Movies/3D
                tags: []

              Sonarr:
                type: sonarr
                sync_level: full-sync
                prowlarr_url: http://prowlarr.default.svc.cluster.local:9696
                base_url: http://sonarr.default.svc.cluster.local:8989
                api_key: !env_var SONARR_API_KEY
                sync_categories:
                  - 5000   # TV
                  - 5010   # TV/WEB-DL
                  - 5020   # TV/Foreign
                  - 5030   # TV/SD
                  - 5040   # TV/HD
                  - 5045   # TV/UHD
                  - 5050   # TV/Other
                anime_sync_categories:
                  - 5070   # TV/Anime
                tags: []

    # =============================================================================
    # SONARR - TV Show Management
    # =============================================================================
    sonarr:
      hostname: sonarr.default.svc.cluster.local
      port: 8989
      protocol: http
      api_key: !env_var SONARR_API_KEY

      settings:
        # ---------------------------------------------------------------------
        # Media Management (TRaSH Best Practices)
        # ---------------------------------------------------------------------
        media_management:
          # Naming - TRaSH Recommended Scheme
          rename_episodes: true
          replace_illegal_characters: true
          # TRaSH recommended format with quality info for proper identification
          standard_episode_format: >-
            {Series TitleYear} - S{season:00}E{episode:00} - {Episode CleanTitle} [{Quality Full}]{[MediaInfo VideoDynamicRangeType]}{[Mediainfo AudioCodec}{ Mediainfo AudioChannels]}{[MediaInfo VideoCodec]}{-Release Group}
          daily_episode_format: >-
            {Series TitleYear} - {Air-Date} - {Episode CleanTitle} [{Quality Full}]{[MediaInfo VideoDynamicRangeType]}{[Mediainfo AudioCodec}{ Mediainfo AudioChannels]}{[MediaInfo VideoCodec]}{-Release Group}
          anime_episode_format: >-
            {Series TitleYear} - S{season:00}E{episode:00} - {Episode CleanTitle} [{Quality Full}]{[MediaInfo VideoDynamicRangeType]}{[Mediainfo AudioCodec}{ Mediainfo AudioChannels]}{[MediaInfo VideoCodec]}{-Release Group}
          series_folder_format: "{Series TitleYear}"
          season_folder_format: "Season {season:00}"
          specials_folder_format: "Specials"
          multiepisode_style: prefixed-range

          # File Management
          create_empty_series_folders: false
          delete_empty_folders: true
          episode_title_required: always
          skip_free_space_check: false
          minimum_free_space: 100  # MB
          # IMPORTANT: Disabled because downloads (Ceph) and media (NAS) are different filesystems
          use_hardlinks: false
          import_extra_files: true
          extra_file_extensions: srt,nfo
          unmonitor_deleted_episodes: true
          # TRaSH: Set to do-not-prefer, let Custom Formats handle scoring
          propers_and_repacks: do-not-prefer
          analyze_video_files: true
          rescan_series_folder_after_refresh: always
          change_file_date: none
          recycling_bin: ""
          recycling_bin_cleanup: 7
          set_permissions: false

          root_folders:
            - /media/tv

        # ---------------------------------------------------------------------
        # Download Clients (Usenet Only)
        # ---------------------------------------------------------------------
        download_clients:
          definitions:
            SABnzbd:
              type: sabnzbd
              enable: true
              priority: 1
              host: sabnzbd.default.svc.cluster.local
              port: 8080
              use_ssl: false
              api_key: !env_var SABNZBD_API_KEY
              category: sonarr
              remove_completed_downloads: true
              remove_failed_downloads: true
              tags: []

            # qBittorrent as backup (lower priority)
            qBittorrent:
              type: qbittorrent
              enable: true
              priority: 2
              host: qbittorrent.default.svc.cluster.local
              port: 8080
              use_ssl: false
              username: !env_var QBITTORRENT_USERNAME
              password: !env_var QBITTORRENT_PASSWORD
              category: sonarr
              directory: ""
              recent_priority: last
              older_priority: last
              initial_state: start
              sequential_order: false
              first_and_last_first: false
              remove_completed_downloads: true
              remove_failed_downloads: true
              tags: []

        # ---------------------------------------------------------------------
        # Notifications / Connections
        # ---------------------------------------------------------------------
        connect:
          definitions:
            Plex:
              type: plex-media-server
              notification_triggers:
                on_grab: false
                on_import: true
                on_upgrade: true
                on_rename: true
                on_series_add: false
                on_series_delete: true
                on_episode_file_delete: true
                on_episode_file_delete_for_upgrade: false
                on_health_issue: false
                on_application_update: false
              host: plex.default.svc.cluster.local
              port: 32400
              use_ssl: false
              auth_token: !env_var PLEX_TOKEN
              update_library: true
              tags: []

    # =============================================================================
    # RADARR - Movie Management
    # =============================================================================
    radarr:
      hostname: radarr.default.svc.cluster.local
      port: 7878
      protocol: http
      api_key: !env_var RADARR_API_KEY

      settings:
        # ---------------------------------------------------------------------
        # Media Management (TRaSH Best Practices)
        # ---------------------------------------------------------------------
        media_management:
          # Naming - TRaSH Recommended Scheme
          rename_movies: true
          replace_illegal_characters: true
          colon_replacement: replace-with-dash
          # TRaSH recommended format with full quality/codec info
          standard_movie_format: >-
            {Movie CleanTitle} {(Release Year)} {Edition Tags} [{Quality Full}]{[MediaInfo VideoDynamicRangeType]}{[Mediainfo AudioCodec}{ Mediainfo AudioChannels]}{[MediaInfo VideoCodec]}{-Release Group}
          movie_folder_format: "{Movie CleanTitle} ({Release Year})"

          # File Management
          create_missing_movie_folders: false
          delete_empty_folders: true
          skip_free_space_check: false
          minimum_free_space: 100  # MB
          # IMPORTANT: Disabled because downloads (Ceph) and media (NAS) are different filesystems
          use_hardlinks: false
          import_extra_files: true
          extra_file_extensions: srt,nfo
          unmonitor_deleted_movies: true
          # TRaSH: Set to do-not-prefer, let Custom Formats handle scoring
          propers_and_repacks: do-not-prefer
          analyze_video_files: true
          rescan_movie_folder_after_refresh: always
          change_file_date: none
          recycling_bin: ""
          recycling_bin_cleanup: 7
          set_permissions: false

          root_folders:
            - /media/movies

        # ---------------------------------------------------------------------
        # Download Clients (Usenet Only)
        # ---------------------------------------------------------------------
        download_clients:
          definitions:
            SABnzbd:
              type: sabnzbd
              enable: true
              priority: 1
              host: sabnzbd.default.svc.cluster.local
              port: 8080
              use_ssl: false
              api_key: !env_var SABNZBD_API_KEY
              category: radarr
              remove_completed_downloads: true
              remove_failed_downloads: true
              tags: []

            # qBittorrent as backup (lower priority)
            qBittorrent:
              type: qbittorrent
              enable: true
              priority: 2
              host: qbittorrent.default.svc.cluster.local
              port: 8080
              use_ssl: false
              username: !env_var QBITTORRENT_USERNAME
              password: !env_var QBITTORRENT_PASSWORD
              category: radarr
              directory: ""
              recent_priority: last
              older_priority: last
              initial_state: start
              sequential_order: false
              first_and_last_first: false
              remove_completed_downloads: true
              remove_failed_downloads: true
              tags: []

        # ---------------------------------------------------------------------
        # Notifications / Connections
        # ---------------------------------------------------------------------
        connect:
          definitions:
            Plex:
              type: plex-media-server
              notification_triggers:
                on_grab: false
                on_import: true
                on_upgrade: true
                on_rename: true
                on_movie_added: false
                on_movie_delete: true
                on_movie_file_delete: true
                on_movie_file_delete_for_upgrade: false
                on_health_issue: false
                on_application_update: false
              host: plex.default.svc.cluster.local
              port: 32400
              use_ssl: false
              auth_token: !env_var PLEX_TOKEN
              update_library: true
              tags: []
