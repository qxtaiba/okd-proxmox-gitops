# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: buildarr
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      buildarr:
        type: cronjob
        cronjob:
          # Run 30 minutes after Recyclarr (which runs at 00:00)
          schedule: "30 0 * * *"
          backoffLimit: 2
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
          ttlSecondsAfterFinished: 86400
        containers:
          app:
            image:
              repository: callum027/buildarr
              tag: 0.8.1
            args:
              - run
            envFrom:
              - secretRef:
                  name: buildarr-secrets
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
        pod:
          restartPolicy: OnFailure
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seLinuxOptions:
          level: "s0"
    persistence:
      config:
        type: emptyDir
      config-file:
        type: configMap
        name: buildarr-config
        globalMounts:
          - path: /config/buildarr.yml
            subPath: buildarr.yml
      tmp:
        type: emptyDir
