# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: qbittorrent
  values:
    controllers:
      qbittorrent:
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          name: qbittorrent
        initContainers:
          init-dirs:
            image:
              repository: docker.io/library/busybox
              tag: 1.37.0
            command:
              - sh
              - -c
              - mkdir -p /downloads/torrents/complete /downloads/torrents/incomplete
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
          gluetun:
            dependsOn: init-dirs
            restartPolicy: Always
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1
            env:
              TZ: Asia/Dubai
              VPN_SERVICE_PROVIDER: protonvpn
              VPN_TYPE: wireguard
              SERVER_COUNTRIES: Netherlands
              PORT_FORWARD_ONLY: "on"
              WIREGUARD_MTU: "1320"
              FIREWALL_VPN_INPUT_PORTS: "6881"
              FIREWALL_OUTBOUND_SUBNETS: "10.128.0.0/14,172.30.0.0/16,192.168.227.0/24"
              FIREWALL_IPV6: "off"
              DNS_KEEP_NAMESERVER: "on"
              VPN_PORT_FORWARDING: "on"
              VPN_PORT_FORWARDING_UP_COMMAND: >-
                /bin/sh -c 'wget -qO- --retry-connrefused
                --post-data "json={\"listen_port\":{{ `{{PORTS}}` }}}"
                http://127.0.0.1:8080/api/v2/app/setPreferences 2>&1'
              PUBLICIP_ENABLED: "false"
              UPDATER_PERIOD: "24h"
            envFrom:
              - secretRef:
                  name: gluetun-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /gluetun-entrypoint
                      - healthcheck
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /gluetun-entrypoint
                      - healthcheck
                  periodSeconds: 10
                  failureThreshold: 30
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
              capabilities:
                add: ["NET_ADMIN", "NET_RAW"]
                drop: ["ALL"]
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 384Mi
                squat.ai/tun: "1"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/qbittorrent
              tag: 5.1.4
            env:
              TZ: Asia/Dubai
              QBT_WEBUI_PORT: "8080"
              QBT_TORRENTING_PORT: "6881"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v2/app/version
                    port: 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v2/app/version
                    port: 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 4Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seLinuxOptions:
          level: "s0"
    service:
      app:
        controller: qbittorrent
        annotations:
          tailscale.com/expose: "true"
        ports:
          http:
            port: 8080
    persistence:
      config:
        existingClaim: qbittorrent-config
        advancedMounts:
          qbittorrent:
            init-dirs: &config-mount
              - path: /config
            app: *config-mount
      downloads:
        existingClaim: downloads
        advancedMounts:
          qbittorrent:
            init-dirs: &downloads-mount
              - path: /downloads
            app: *downloads-mount
      media:
        type: nfs
        server: nas.grappleberry.xyz
        path: /volume1/media
        advancedMounts:
          qbittorrent:
            app:
              - path: /media
      tmp:
        type: emptyDir
        advancedMounts:
          qbittorrent:
            app:
              - path: /tmp
      gluetun-data:
        type: emptyDir
        advancedMounts:
          qbittorrent:
            gluetun:
              - path: /tmp/gluetun
