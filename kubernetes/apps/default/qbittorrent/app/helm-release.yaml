# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: qbittorrent
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    controllers:
      qbittorrent:
        annotations:
          reloader.stakater.com/auto: "true"
        serviceAccount:
          name: qbittorrent
        initContainers:
          init-dirs:
            image:
              repository: docker.io/library/busybox
              tag: 1.37.0
            command:
              - sh
              - -c
              - mkdir -p /downloads/torrents/complete /downloads/torrents/incomplete
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
          gluetun:
            dependsOn: init-dirs
            restartPolicy: Always
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1
            env:
              TZ: Asia/Dubai
              VPN_SERVICE_PROVIDER: protonvpn
              VPN_TYPE: wireguard
              VPN_INTERFACE: wg0
              SERVER_COUNTRIES: Netherlands
              SERVER_CITIES: Amsterdam
              PORT_FORWARD_ONLY: "on"
              WIREGUARD_MTU: "1340"
              FIREWALL_INPUT_PORTS: "8080"
              FIREWALL_VPN_INPUT_PORTS: "6881"
              FIREWALL_OUTBOUND_SUBNETS: "10.128.0.0/14,172.30.0.0/16,192.168.227.0/24"
              FIREWALL_IPV6: "off"
              UPDATER_PERIOD: 24h
              UPDATER_VPN_SERVICE_PROVIDERS: protonvpn
              VPN_PORT_FORWARDING: "on"
              VPN_PORT_FORWARDING_UP_COMMAND: >-
                /bin/sh -c 'wget -qO- --retry-connrefused --waitretry=5 --tries=10 --post-data "json={\"listen_port\":{{ "{{" }}PORTS{{ "}}" }}}" http://127.0.0.1:8080/api/v2/app/setPreferences 2>&1'
              VPN_PORT_FORWARDING_DOWN_COMMAND: >-
                /bin/sh -c 'wget -qO- --retry-connrefused --post-data "json={\"listen_port\":0}" http://127.0.0.1:8080/api/v2/app/setPreferences 2>&1'
            lifecycle:
              postStart:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - (ip rule del table 51820; ip -6 rule del table 51820) || true
            envFrom:
              - secretRef:
                  name: gluetun-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /gluetun-entrypoint
                      - healthcheck
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /gluetun-entrypoint
                      - healthcheck
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /gluetun-entrypoint
                      - healthcheck
                  periodSeconds: 10
                  failureThreshold: 30
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
              seLinuxOptions:
                level: "s0"
              capabilities:
                drop: ["ALL"]
                add: ["NET_ADMIN", "NET_RAW", "CHOWN", "NET_BIND_SERVICE", "DAC_OVERRIDE"]
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 384Mi
                squat.ai/tun: "1"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/qbittorrent
              tag: 5.2.0
            env:
              TZ: Asia/Dubai
              QBT_WEBUI_PORT: "8080"
              QBT_TORRENTING_PORT: "6881"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v2/app/version
                    port: 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v2/app/version
                    port: 8080
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v2/app/version
                    port: 8080
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 2000m
                memory: 4Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seLinuxOptions:
          level: "s0"
    service:
      app:
        controller: qbittorrent
        ports:
          http:
            port: 8080
    persistence:
      config:
        existingClaim: qbittorrent-config
        advancedMounts:
          qbittorrent:
            init-dirs: &config-mount
              - path: /config
            app: *config-mount
      downloads:
        existingClaim: downloads
        advancedMounts:
          qbittorrent:
            init-dirs: &downloads-mount
              - path: /downloads
            app: *downloads-mount
      media:
        existingClaim: media
        advancedMounts:
          qbittorrent:
            app:
              - path: /media
      tmp:
        type: emptyDir
        advancedMounts:
          qbittorrent:
            app:
              - path: /tmp
      gluetun-data:
        type: emptyDir
        advancedMounts:
          qbittorrent:
            gluetun:
              - path: /tmp/gluetun
