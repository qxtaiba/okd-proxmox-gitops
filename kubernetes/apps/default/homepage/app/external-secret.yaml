# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: homepage-secret
    template:
      data:
        # Arr Apps API Keys (from existing 1Password items)
        HOMEPAGE_VAR_SONARR_API_KEY: "{{ .sonarr_api_key }}"
        HOMEPAGE_VAR_RADARR_API_KEY: "{{ .radarr_api_key }}"
        HOMEPAGE_VAR_PROWLARR_API_KEY: "{{ .prowlarr_api_key }}"
        HOMEPAGE_VAR_SABNZBD_API_KEY: "{{ .sabnzbd_api_key }}"
        HOMEPAGE_VAR_OVERSEERR_API_KEY: "{{ .overseerr_api_key }}"
        # Plex Token
        HOMEPAGE_VAR_PLEX_TOKEN: "{{ .plex_token }}"
        # Proxmox API Token
        HOMEPAGE_VAR_PROXMOX_TOKEN_ID: "{{ .proxmox_token_id }}"
        HOMEPAGE_VAR_PROXMOX_TOKEN_SECRET: "{{ .proxmox_token_secret }}"
        # Grafana
        HOMEPAGE_VAR_GRAFANA_USERNAME: "admin"
        HOMEPAGE_VAR_GRAFANA_PASSWORD: "{{ .grafana_password }}"
        # Synology
        HOMEPAGE_VAR_SYNOLOGY_USERNAME: "{{ .synology_username }}"
        HOMEPAGE_VAR_SYNOLOGY_PASSWORD: "{{ .synology_password }}"
        # qBittorrent
        HOMEPAGE_VAR_QBITTORRENT_USERNAME: "{{ .qbittorrent_username }}"
        HOMEPAGE_VAR_QBITTORRENT_PASSWORD: "{{ .qbittorrent_password }}"
  data:
    # Arr/download app API keys use the api_key convention, matching
    # devopsarr and recyclarr. All 1Password items expose this field.
    - secretKey: sonarr_api_key
      remoteRef:
        key: sonarr
        property: api_key
    - secretKey: radarr_api_key
      remoteRef:
        key: radarr
        property: api_key
    - secretKey: prowlarr_api_key
      remoteRef:
        key: prowlarr
        property: api_key
    - secretKey: sabnzbd_api_key
      remoteRef:
        key: sabnzbd
        property: api_key
    - secretKey: overseerr_api_key
      remoteRef:
        key: overseerr
        property: api_key
    - secretKey: plex_token
      remoteRef:
        key: plex
        property: PLEX_TOKEN
    - secretKey: proxmox_token_id
      remoteRef:
        key: proxmox
        property: PROXMOX_TOKEN_ID
    - secretKey: proxmox_token_secret
      remoteRef:
        key: proxmox
        property: PROXMOX_TOKEN_SECRET
    - secretKey: grafana_password
      remoteRef:
        key: grafana
        property: GF_SECURITY_ADMIN_PASSWORD
    - secretKey: synology_username
      remoteRef:
        key: synology
        property: username
    - secretKey: synology_password
      remoteRef:
        key: synology
        property: password
    - secretKey: qbittorrent_username
      remoteRef:
        key: qbittorrent
        property: username
    - secretKey: qbittorrent_password
      remoteRef:
        key: qbittorrent
        property: password
