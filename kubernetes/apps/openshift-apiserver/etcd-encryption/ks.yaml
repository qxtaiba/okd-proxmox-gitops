# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: etcd-encryption
  namespace: flux-system
spec:
  path: ./kubernetes/apps/openshift-apiserver/etcd-encryption/app
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 10m
  # The APIServer CR is cluster-scoped and takes several minutes to roll
  # out encryption changes to kube-apiserver pods. wait: false so Flux
  # does not block on the full rollout.
  timeout: 5m
  retryInterval: 1m
  prune: false
  wait: false
