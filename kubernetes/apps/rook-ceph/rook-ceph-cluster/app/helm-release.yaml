# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: rook-ceph-cluster
  # The cluster chart waits on operator-reconciled CRs (CephCluster phase,
  # OSD health). With wait:true Helm times out before the operator settles
  # and loops through rollbacks. Disable wait and gate dependents via
  # Kustomization-level health checks instead.
  install:
    disableWait: true
    remediation:
      retries: 3
  upgrade:
    disableWait: true
    remediation:
      retries: 3
  values:
    operatorNamespace: rook-ceph
    monitoring:
      enabled: true
      createPrometheusRules: true
    toolbox:
      enabled: true
    # NOTE: This cluster requires >=3 Ceph-eligible nodes.
    # All pools use failureDomain: host with replicated.size: 3, which is
    # mathematically unsatisfiable with <3 hosts (pools sit DEGRADED, I/O blocks).
    # If shrinking the cluster below 3 hosts, adjust replicated.size and
    # failureDomain in every pool (cephBlockPools, cephFileSystems, cephObjectStores).
    cephImage:
      repository: quay.io/ceph/ceph
      tag: v20.2.2
    cephClusterSpec:
      cleanupPolicy:
        wipeDevicesFromOtherClusters: true
      cephConfig:
        global:
          bdev_enable_discard: "true"
          bdev_async_discard_threads: "1"
          osd_class_update_on_start: "false"
          device_failure_prediction_mode: local
      crashCollector:
        disable: false
      csi:
        readAffinity:
          enabled: true
          crushLocationLabels:
            - kubernetes.io/hostname
      dashboard:
        enabled: true
        ssl: true
      mgr:
        modules:
          # diskprediction_local disabled: virtual disks (QEMU virtio-scsi)
          # don't report real SMART data, causing nightly MgrDBNotReady
          # crashes in the devicehealth module (ceph-tracker#64621).
          - name: diskprediction_local
            enabled: false
          - name: insights
            enabled: true
          - name: pg_autoscaler
            enabled: true
          - name: rook
            enabled: true
      placement:
        all:
          tolerations:
            - key: storage-node
              operator: Exists
      resources:
        mon:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            memory: 2Gi
        mgr:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 1Gi
        osd:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            memory: 4Gi
      storage:
        useAllNodes: true
        useAllDevices: false
        # Match the second Terraform-provisioned disk (scsi1 = CEPH-DATA).
        # Using devicePathFilter because virtio-scsi-single enumeration of
        # /dev/sdX is non-deterministic across reboots, but the SCSI bus
        # assignment (drive-scsi1) is stable per Terraform disk block order.
        devicePathFilter: "^/dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_drive-scsi1$"
        config:
          osdsPerDevice: "1"
    cephBlockPools:
      - name: okd-rbd
        spec:
          failureDomain: host
          replicated:
            size: 3
            requireSafeReplicaSize: true
        storageClass:
          enabled: true
          name: ceph-block
          isDefault: true
          reclaimPolicy: Retain
          allowVolumeExpansion: true
          volumeBindingMode: Immediate
          mountOptions:
            - discard
          parameters:
            compression_mode: aggressive
            compression_algorithm: zstd
            imageFormat: "2"
            imageFeatures: layering,fast-diff,object-map,deep-flatten,exclusive-lock
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/fstype: ext4
    cephBlockPoolsVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-blockpool
      isDefault: false
      deletionPolicy: Delete
    cephFileSystems:
      - name: okd-cephfs
        spec:
          metadataPool:
            failureDomain: host
            replicated:
              size: 3
              requireSafeReplicaSize: true
          dataPools:
            - failureDomain: host
              replicated:
                size: 3
                requireSafeReplicaSize: true
              name: data0
          preserveFilesystemOnDelete: true
          metadataServer:
            activeCount: 1
            activeStandby: true
            priorityClassName: system-cluster-critical
            placement:
              topologySpreadConstraints:
                - maxSkew: 1
                  topologyKey: kubernetes.io/hostname
                  whenUnsatisfiable: DoNotSchedule
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: ceph-mds
                      app.kubernetes.io/part-of: okd-cephfs
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 4Gi
        storageClass:
          enabled: true
          name: ceph-filesystem
          pool: data0
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          volumeBindingMode: Immediate
          parameters:
            csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
            csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
            csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
            csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
    cephFileSystemVolumeSnapshotClass:
      enabled: true
      name: csi-ceph-filesystem
      isDefault: false
      deletionPolicy: Delete
    cephObjectStores:
      - name: okd-ceph-objectstore
        spec:
          metadataPool:
            failureDomain: host
            replicated:
              size: 3
              requireSafeReplicaSize: true
          dataPool:
            failureDomain: host
            replicated:
              size: 3
              requireSafeReplicaSize: true
          preservePoolsOnDelete: true
          gateway:
            port: 80
            instances: 2
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi
        storageClass:
          enabled: true
          name: ceph-bucket
          reclaimPolicy: Delete
