# yaml-language-server: $schema=https://json.schemastore.org/kustomization
---
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
# Shared defaults for every ReplicationSource in the cluster.
# Per-app files only declare: metadata.name, sourcePVC, trigger.schedule,
# restic.repository, restic.volumeSnapshotClassName, restic.cacheCapacity.
patches:
  - path: ./patch.yaml
    target:
      group: volsync.backube
      version: v1alpha1
      kind: ReplicationSource
